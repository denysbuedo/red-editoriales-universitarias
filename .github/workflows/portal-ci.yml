name: Portal CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: npm run quality

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Smoke test production server
        env:
          HOSTNAME: 127.0.0.1
          PORT: 4307
          PNPU_SMOKE_BASE_URL: http://127.0.0.1:4307
        run: |
          npm run start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npm run smoke
