name: Infrastructure CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - "requirements-infra.txt"
      - "scripts/health-check.sh"
      - "scripts/validate-infrastructure.py"
      - ".github/workflows/infrastructure-ci.yml"

jobs:
  validate-infrastructure:
    name: Validate infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ansible
        run: python -m pip install -r requirements-infra.txt

      - name: Validate infrastructure YAML
        run: python scripts/validate-infrastructure.py

      - name: Validate health check script
        run: bash -n scripts/health-check.sh

      - name: Provision syntax check
        run: ansible-playbook -i infrastructure/inventories/dev/hosts.yml infrastructure/playbooks/provision.yml --syntax-check

      - name: Deploy syntax check
        run: ansible-playbook -i infrastructure/inventories/dev/hosts.yml infrastructure/playbooks/deploy.yml --syntax-check

      - name: Verify syntax check
        run: ansible-playbook -i infrastructure/inventories/dev/hosts.yml infrastructure/playbooks/verify.yml --syntax-check

      - name: Rollback syntax check
        run: ansible-playbook -i infrastructure/inventories/dev/hosts.yml infrastructure/playbooks/rollback.yml --syntax-check
