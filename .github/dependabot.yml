version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Havana
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Havana
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docs

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Havana
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
