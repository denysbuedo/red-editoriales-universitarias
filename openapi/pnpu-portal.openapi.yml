      schema:
        $ref: "#/components/schemas/PnpuUuid"
    PublicationCollectionId:
      name: collectionId
      in: query
      required: false
      description: UUID PNPU de la colección editorial.
      schema:
        $ref: "#/components/schemas/PnpuUuid"
    PublicationLanguage:
      name: language
      in: query
      required: false
      description: Idioma ISO 639-1 de la publicación.
      schema:
        type: string
        pattern: ^[a-z]{2}$
    PublicationSubject:
      name: subject
      in: query
      required: false
      description: Texto o identificador de materia.
      schema:
        type: string
        maxLength: 120
    PublicationSort:
      name: sort
      in: query
      required: false
      description: Criterio de ordenamiento del listado de publicaciones.
