openapi: 3.1.0
info:
  title: PNPU Portal API
  version: 0.1.0
  description: API técnica inicial del Portal PNPU.
servers:
  - url: http://127.0.0.1:4307
    description: Desarrollo local
paths:
  /v1/publications:
    get:
      operationId: listPublications
      summary: Lista publicaciones públicas del catálogo PNPU.
      tags:
        - Catalog
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PublicationSearch"
        - $ref: "#/components/parameters/PublicationPublisherId"
        - $ref: "#/components/parameters/PublicationContributorId"
        - $ref: "#/components/parameters/PublicationCollectionId"
        - $ref: "#/components/parameters/PublicationLanguage"
        - $ref: "#/components/parameters/PublicationSubject"
        - $ref: "#/components/parameters/PublicationSort"
      responses:
        "200":
          description: Listado paginado de publicaciones.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationListResponse"
        "422":
          description: Parámetros de paginación inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/publications/{id}:
    get:
      operationId: getPublication
      summary: Devuelve la ficha pública de una publicación por UUID PNPU.
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          required: true
          description: UUID v7 público de la publicación.
          schema:
            $ref: "#/components/schemas/PnpuUuid"
      responses:
        "200":
          description: Ficha pública de la publicación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationDetailResponse"
        "404":
          description: Publicación no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Identificador inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/publishers:
    get:
      operationId: listPublishers
      summary: Lista editoriales universitarias integradas en PNPU.
      tags:
        - Catalog
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Listado paginado de editoriales.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublisherListResponse"
        "422":
          description: Parámetros de paginación inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections:
    get:
      operationId: listCollections
      summary: Lista colecciones editoriales PNPU.
      tags:
        - Catalog
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Listado paginado de colecciones.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionListResponse"
        "422":
          description: Parámetros de paginación inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{id}:
    get:
      operationId: getCollection
      summary: Devuelve la ficha pública de una colección por UUID PNPU.
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          required: true
          description: UUID v7 público de la colección.
          schema:
            $ref: "#/components/schemas/PnpuUuid"
      responses:
        "200":
          description: Ficha pública de la colección.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDetailResponse"
        "404":
          description: Colección no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Identificador inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/publishers/{id}:
    get:
      operationId: getPublisher
      summary: Devuelve la ficha pública de una editorial por UUID PNPU.
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          required: true
          description: UUID v7 público de la editorial.
          schema:
            $ref: "#/components/schemas/PnpuUuid"
      responses:
        "200":
          description: Ficha pública de la editorial.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublisherDetailResponse"
        "404":
          description: Editorial no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Identificador inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/contributors:
    get:
      operationId: listContributors
      summary: Lista autoridades de autores y contribuyentes PNPU.
      tags:
        - Catalog
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Listado paginado de contribuyentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributorListResponse"
        "422":
          description: Parámetros de paginación inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/contributors/{id}:
    get:
      operationId: getContributor
      summary: Devuelve la ficha pública de un autor o contribuyente por UUID PNPU.
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          required: true
          description: UUID v7 público del contribuyente.
          schema:
            $ref: "#/components/schemas/PnpuUuid"
      responses:
        "200":
          description: Ficha pública del contribuyente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributorDetailResponse"
        "404":
          description: Contribuyente no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Identificador inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/subjects:
    get:
      operationId: listSubjects
      summary: Lista materias públicas de la taxonomía PNPU.
      tags:
        - Catalog
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Listado paginado de materias.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectListResponse"
        "422":
          description: Parámetros de paginación inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/subjects/{identifier}:
    get:
      operationId: getSubject
      summary: Devuelve la ficha pública de una materia por identificador.
      tags:
        - Catalog
      parameters:
        - name: identifier
          in: path
          required: true
          description: Identificador público de la materia. Debe enviarse codificado en URL cuando contenga caracteres reservados.
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Ficha pública de la materia.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectDetailResponse"
        "404":
          description: Materia no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Identificador inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /version:
    get:
      operationId: getVersion
      summary: Devuelve metadata de versión del Portal PNPU.
      tags:
        - Operations
      responses:
        "200":
          description: Metadata de versión.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
              examples:
                version:
                  value:
                    service: pnpu-portal
                    version: 0.1.0
                    commitSha: null
  /metrics:
    get:
      operationId: getMetrics
      summary: Devuelve métricas básicas en formato Prometheus.
      tags:
        - Operations
      responses:
        "200":
          description: Métricas Prometheus.
          content:
            text/plain:
              schema:
                type: string
  /openapi.yaml:
    get:
      operationId: getOpenApiContract
      summary: Devuelve el contrato OpenAPI del Portal PNPU.
      tags:
        - Documentation
      responses:
        "200":
          description: Contrato OpenAPI en formato YAML.
          content:
            application/yaml:
              schema:
                type: string
  /api/admin/auth/login:
    get:
      operationId: startAdminOidcLogin
      summary: Inicia el login OIDC administrativo.
      description: >
        Redirige al proveedor OIDC institucional usando Authorization Code con PKCE. PNPU no
        almacena usuarios ni contraseñas.
      tags:
        - Admin
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Ruta administrativa relativa a la que se vuelve despues del login.
          schema:
            type: string
            default: /admin/importaciones/publicaciones
      responses:
        "307":
          description: Redirección al authorization endpoint OIDC.
        "503":
          description: Login OIDC no configurado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/auth/callback:
    get:
      operationId: completeAdminOidcLogin
      summary: Completa el callback OIDC administrativo.
      description: >
        Intercambia el código OIDC, valida el JWT y emite una cookie HTTP-only de sesión
        administrativa.
      tags:
        - Admin
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "307":
          description: Redirección a la pantalla administrativa solicitada.
        "403":
          description: Callback inválido o token OIDC sin rol administrativo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Login OIDC no configurado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/auth/logout:
    get:
      operationId: logoutAdminOidcSession
      summary: Cierra la sesión administrativa local de PNPU.
      tags:
        - Admin
      responses:
        "307":
          description: Redirección al inicio despues de limpiar la cookie administrativa.
  /api/admin/publication-imports/diagnose:
    post:
      operationId: diagnosePublicationImport
      summary: Diagnostica un archivo XLSX de publicaciones entregado por una editorial.
      description: >
        Endpoint operativo protegido por token. No escribe en Omeka S, PostgreSQL ni publica
        registros; solo devuelve un lote de importación con diagnóstico.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportDiagnoseRequest"
      responses:
        "200":
          description: Diagnóstico del lote de importación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportBatchResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o diagnóstico no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/mapping-preview:
    post:
      operationId: previewPublicationImportMapping
      summary: Previsualiza el mapeo PNPU/Omeka de un archivo XLSX diagnosticado.
      description: >
        Endpoint operativo protegido por token. Evalúa filas de una planilla XLSX y clasifica cada
        registro como mapeable, pendiente de enriquecimiento o rechazado. No escribe en Omeka S ni
        PostgreSQL.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportMappingPreviewRequest"
      responses:
        "200":
          description: Vista previa de mapeo del lote.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportMappingPreviewResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o preview no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/dry-run:
    post:
      operationId: dryRunPublicationImport
      summary: Valida en seco una importación enriquecida de publicaciones.
      description: >
        Cruza una planilla XLSX con el CSV de enriquecimiento completado y devuelve candidatos de
        importación listos, incompletos o rechazados. No escribe en Omeka S ni PostgreSQL.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportDryRunRequest"
      responses:
        "200":
          description: Resultado del dry-run de importación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportDryRunResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o dry-run no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/commit-plan:
    post:
      operationId: planPublicationImportCommit
      summary: Genera un plan operativo de escritura para un paquete validado.
      description: >
        Valida un paquete JSON exportado por el dry-run, consulta el catálogo activo para detectar
        duplicados existentes por ISBN o DOI y devuelve operaciones proyectadas y riesgos
        bloqueantes. No escribe en Omeka S ni PostgreSQL.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportCommitPlanRequest"
      responses:
        "200":
          description: Plan operativo no ejecutado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportCommitPlanResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o plan no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/commit:
    post:
      operationId: commitPublicationImport
      summary: Ejecuta escritura controlada de un paquete validado hacia Omeka S.
      description: >
        Ejecuta el plan de commit y crea Items/Media en Omeka S solo si no existen riesgos
        bloqueantes y `PNPU_OMEKA_IMPORT_ENABLED=true`.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportCommitPlanRequest"
      responses:
        "200":
          description: Resultado de escritura en Omeka S.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportCommitResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Paquete inválido o plan bloqueado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Escritura no configurada o Omeka no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/authorities:
    get:
      operationId: listPublicationImportAuthorities
      summary: Lista autoridades del catálogo activo para enriquecer importaciones.
      description: >
        Devuelve editoriales, contribuyentes y materias disponibles en el catálogo activo para
        completar `publisherAuthorityId`, `contributorAuthorityIds` y `subjects` en la plantilla de
        enriquecimiento. No escribe en Omeka S ni PostgreSQL.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      responses:
        "200":
          description: Autoridades disponibles para enriquecimiento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportAuthoritiesResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o autoridades no disponibles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/history:
    get:
      operationId: listPublicationImportHistory
      summary: Lista manifiestos de auditoría de commits de importación.
      description: >
        Devuelve el historial operativo de lotes escritos desde la herramienta administrativa de
        importación de publicaciones. No escribe en Omeka S ni PostgreSQL.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      responses:
        "200":
          description: Historial de commits de importación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportAuditLogResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado o historial no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/rollback-plan:
    post:
      operationId: planPublicationImportRollback
      summary: Genera un plan no destructivo de rollback para un commit importado.
      description: >
        Lee un manifiesto de auditoría, verifica los recursos creados contra Omeka S y devuelve
        operaciones proyectadas o riesgos bloqueantes. No elimina Items ni Media.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportRollbackPlanRequest"
      responses:
        "200":
          description: Plan de rollback no ejecutado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportRollbackPlanResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Manifiesto de auditoría no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado u Omeka no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/publication-imports/rollback:
    post:
      operationId: rollbackPublicationImport
      summary: Ejecuta rollback controlado de un commit importado.
      description: >
        Genera primero el plan de rollback, bloquea si existe cualquier riesgo y elimina en Omeka S
        solo cuando `PNPU_OMEKA_ROLLBACK_ENABLED=true`. Registra el resultado de rollback en
        auditoría local.
      tags:
        - Admin
      security:
        - PublicationImportToken: []
        - PublicationImportOidcBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationImportRollbackPlanRequest"
      responses:
        "200":
          description: Resultado de rollback ejecutado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationImportRollbackResponse"
        "403":
          description: Token administrativo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Manifiesto de auditoría no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Solicitud inválida o plan bloqueado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Endpoint no configurado u Omeka no disponible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health/live:
    get:
      operationId: getLiveHealth
      summary: Verifica que el proceso del Portal está activo.
      tags:
        - Health
      responses:
        "200":
          description: El proceso está activo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveHealthResponse"
              examples:
                live:
                  value:
                    status: ok
                    service: pnpu-portal
                    version: 0.1.0
                    commitSha: null
  /health/ready:
    get:
      operationId: getReadyHealth
      summary: Verifica que el Portal puede recibir tráfico.
      tags:
        - Health
      responses:
        "200":
          description: El servicio está listo para recibir tráfico.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyHealthResponse"
              examples:
                ready:
                  value:
                    status: ready
                    service: pnpu-portal
                    version: 0.1.0
                    commitSha: null
                    dependencies: {}
components:
  securitySchemes:
    PublicationImportToken:
      type: apiKey
      in: header
      name: X-PNPU-Admin-Token
    PublicationImportOidcBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Número de página, empezando en 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Cantidad de elementos por página.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    PublicationSearch:
      name: q
      in: query
      required: false
      description: Texto de búsqueda sobre título, subtítulo, resumen, editorial, identificadores, materias y palabras clave.
      schema:
        type: string
        maxLength: 120
    PublicationPublisherId:
      name: publisherId
      in: query
      required: false
      description: UUID PNPU de la editorial.
      schema:
        $ref: "#/components/schemas/PnpuUuid"
    PublicationContributorId:
      name: contributorId
      in: query
      required: false
