---
- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ pnpu_service_group }}"
    system: true

- name: Ensure service user exists
  ansible.builtin.user:
    name: "{{ pnpu_service_user }}"
    group: "{{ pnpu_service_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ pnpu_base_dir }}"
    create_home: false

- name: Ensure portal directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(pnpu_service_user) }}"
    group: "{{ item.group | default(pnpu_service_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ pnpu_base_dir }}"
      mode: "0755"
    - path: "{{ pnpu_base_dir }}/releases"
      mode: "0755"
    - path: "{{ pnpu_base_dir }}/shared"
      mode: "0755"
    - path: "{{ pnpu_base_dir }}/shared/logs"
      mode: "0755"
    - path: "{{ pnpu_base_dir }}/shared/uploads"
      mode: "0755"
    - path: "{{ pnpu_base_dir }}/shared/config"
      mode: "0750"
    - path: "{{ pnpu_base_dir }}/shared/artifacts"
      mode: "0750"
    - path: "{{ pnpu_base_dir }}/shared/deployments"
      mode: "0750"
    - path: "{{ pnpu_env_dir }}"
      owner: root
      group: root
      mode: "0750"

- name: Install portal environment file
  ansible.builtin.template:
    src: portal.env.j2
    dest: "{{ pnpu_env_file }}"
    owner: root
    group: "{{ pnpu_service_group }}"
    mode: "0640"
    force: false

- name: Install portal systemd unit
  ansible.builtin.template:
    src: pnpu-portal.service.j2
    dest: "/etc/systemd/system/{{ pnpu_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart portal

- name: Enable portal service
  ansible.builtin.systemd:
    name: "{{ pnpu_service_name }}"
    enabled: true
  when: pnpu_portal_manage_service | bool
