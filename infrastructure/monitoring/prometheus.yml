global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: pnpu-portal
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:3000
        labels:
          application: pnpu-portal
          environment: dev

  - job_name: pnpu-portal-health
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://127.0.0.1:3000/health/ready
        labels:
          application: pnpu-portal
          environment: dev
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
